<!-- @dsCard group="Colors" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { height: 96px; border-radius: var(--r-sm); padding: 10px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--shadow-1); }
  .top { font-family: var(--font-ui); font-weight: 800; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .bot { font-family: var(--font-mono); font-size: 10px; opacity: 0.9; }
  .light { color: white; } .dark { color: #212529; }
</style></head>
<body>
  <div class="grid">
    <div class="sw light" style="background:#A292FF"><div class="top">Lavender</div><div class="bot">#A292FF</div></div>
    <div class="sw light" style="background:#FF3131"><div class="top">Rooster</div><div class="bot">#FF3131</div></div>
    <div class="sw light" style="background:#4361EE"><div class="top">Blueberry</div><div class="bot">#4361EE</div></div>
    <div class="sw light" style="background:#06D6A0"><div class="top">Clover</div><div class="bot">#06D6A0</div></div>
    <div class="sw dark"  style="background:#FF90FE"><div class="top">Flamingo</div><div class="bot">#FF90FE</div></div>
    <div class="sw dark"  style="background:#FFB4A2"><div class="top">Coral</div><div class="bot">#FFB4A2</div></div>
    <div class="sw light" style="background:#9C6644"><div class="top">Bear</div><div class="bot">#9C6644</div></div>
    <div class="sw dark"  style="background:#E7BC91"><div class="top">Fawn</div><div class="bot">#E7BC91</div></div>
    <div class="sw light" style="background:#950000"><div class="top">Pomegranate</div><div class="bot">#950000</div></div>
    <div class="sw dark"  style="background:#ADB5BD"><div class="top">Lunar</div><div class="bot">#ADB5BD</div></div>
    <div class="sw light" style="background:#212529"><div class="top">Onyx</div><div class="bot">#212529</div></div>
    <div class="sw dark"  style="background:#FFFFFF;border:1px solid var(--border)"><div class="top">Polar</div><div class="bot">#FFFFFF</div></div>
  </div>
</body></html>
