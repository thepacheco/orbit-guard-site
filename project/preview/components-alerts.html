<!-- @dsCard group="Components" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 22px; }
  .stack { display: flex; flex-direction: column; gap: 12px;}
  .alert { display: flex; gap: 12px; padding: 14px 16px; border-radius: var(--r-md); align-items: flex-start;}
  .icn { width: 22px; height: 22px; flex-shrink: 0; border-radius: 50%; display:grid; place-items:center; color:white; font-weight: 800; font-size: 14px; line-height: 1; }
  .ttl { font-weight: 700; }
  .msg { font-size: 13px; color: var(--fg-2); }
  .info  { background:#E2E7FF; }   .info  .icn { background:#5A74FF; }
  .ok    { background:#D9F7EE; }   .ok    .icn { background:#06D6A0; color:#0a6f55;}
  .warn  { background:#FFF1D9; }   .warn  .icn { background:#E7BC91; color:#5c3915;}
  .err   { background:#FFE2DD; }   .err   .icn { background:#FF3131; }
</style></head>
<body>
  <div class="stack">
    <div class="alert info"><div class="icn">i</div><div><div class="ttl">Free shipping over $30</div><div class="msg">Just add one more pack and you're there.</div></div></div>
    <div class="alert ok"><div class="icn">✓</div><div><div class="ttl">Order placed</div><div class="msg">We'll text you when it ships, usually within a day.</div></div></div>
    <div class="alert warn"><div class="icn">!</div><div><div class="ttl">Low stock — Clover</div><div class="msg">Only 12 packs of Clover left this week.</div></div></div>
    <div class="alert err"><div class="icn">×</div><div><div class="ttl">Card declined</div><div class="msg">Try another method or contact your bank.</div></div></div>
  </div>
</body></html>
