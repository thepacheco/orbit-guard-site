<!-- @dsCard group="Components" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px;}
  .row:last-child { margin-bottom: 0; }
  .badge { font: 700 12px var(--font-ui); padding: 6px 12px; border-radius: 999px; letter-spacing: 0.02em; display:inline-flex; align-items:center; gap:6px;}
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .lbl { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-3); width: 78px; }
</style></head>
<body>
  <div class="row"><div class="lbl">Status</div>
    <span class="badge" style="background:#D9F7EE;color:#0a6f55"><span class="dot"></span>In stock</span>
    <span class="badge" style="background:#FFE2DD;color:#8a2a18"><span class="dot"></span>Sold out</span>
    <span class="badge" style="background:#FFF1D9;color:#7a5418"><span class="dot"></span>Backorder</span>
    <span class="badge" style="background:#E2E7FF;color:#293bb0"><span class="dot"></span>New</span>
  </div>
  <div class="row"><div class="lbl">Chips</div>
    <span class="badge" style="background:#5A74FF;color:white">Lavender</span>
    <span class="badge" style="background:#06D6A0;color:#0a3a2c">Clover</span>
    <span class="badge" style="background:#FFB4A2;color:#5a1f10">Coral</span>
    <span class="badge" style="background:#E7BC91;color:#5c3915">Fawn</span>
    <span class="badge" style="background:#212529;color:white">Onyx</span>
  </div>
  <div class="row"><div class="lbl">Tags</div>
    <span class="badge" style="background:transparent;color:var(--og-blue);box-shadow: inset 0 0 0 1.5px var(--og-blue)">For pets</span>
    <span class="badge" style="background:transparent;color:var(--og-blue);box-shadow: inset 0 0 0 1.5px var(--og-blue)">For cords</span>
    <span class="badge" style="background:transparent;color:var(--og-blue);box-shadow: inset 0 0 0 1.5px var(--og-blue)">Hardwood-safe</span>
  </div>
</body></html>
