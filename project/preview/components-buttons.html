<!-- @dsCard group="Components" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 14px;}
  .row:last-child { margin-bottom: 0; }
  .btn { font-family: var(--font-ui); font-weight: 700; font-size: 15px; border: none; cursor: pointer;
         padding: 12px 22px; border-radius: var(--r-pill); transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out); }
  .primary { background: var(--og-blue); color: white; box-shadow: var(--shadow-blue); }
  .secondary { background: var(--og-white); color: var(--pal-onyx); box-shadow: var(--shadow-1); }
  .ghost { background: transparent; color: var(--og-blue); box-shadow: inset 0 0 0 1.5px var(--og-blue); }
  .link { background: transparent; color: var(--og-blue); padding: 8px 4px; box-shadow: none; text-decoration: underline; text-underline-offset: 4px; }
  .danger { background: var(--pal-rooster); color: white; }
  .sm { padding: 8px 14px; font-size: 13px; }
  .lg { padding: 16px 28px; font-size: 17px; }
  .label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-3); width: 64px; }
</style></head>
<body>
  <div class="row"><div class="label">Primary</div>
    <button class="btn primary sm">Add to cart</button>
    <button class="btn primary">Add to cart</button>
    <button class="btn primary lg">Add to cart →</button>
  </div>
  <div class="row"><div class="label">Variants</div>
    <button class="btn secondary">Learn more</button>
    <button class="btn ghost">Ghost</button>
    <button class="btn link">Read the guide →</button>
    <button class="btn danger">Remove</button>
  </div>
</body></html>
