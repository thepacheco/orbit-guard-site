<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 24px; background: var(--bg-inset); }
  .shell { position: relative; height: 88px; }
  header {
    position: relative;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px 12px 20px;
    background: #fff;
    border-radius: 999px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
  }
  nav { display: flex; align-items: center; gap: 4px; }
  nav a {
    font: 600 14px var(--font-ui); color: var(--fg-2);
    text-decoration: none; padding: 8px 14px; border-radius: 999px;
    cursor: pointer; transition: all 140ms var(--ease-out);
    position: relative; display: inline-flex; align-items: center; gap: 6px;
  }
  nav a.active { background: #F6F6F4; color: var(--fg); }
  nav a:hover { color: var(--fg); }
  .new-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--og-blue); box-shadow: 0 0 0 4px rgba(90,116,255,0.18);
  }

  .logo { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  .logo img { width: 32px; height: 32px; border-radius: 50%; display: block; }

  .right { display: flex; align-items: center; gap: 4px; }
  .ic {
    width: 36px; height: 36px; border-radius: 50%;
    background: transparent; border: none; cursor: pointer;
    color: var(--fg); display: grid; place-items: center; position: relative;
    transition: background 140ms var(--ease-out);
  }
  .ic:hover { background: #F6F6F4; }
  .ic svg { width: 18px; height: 18px; stroke-width: 1.6; }
  .badge {
    position: absolute; top: 4px; right: 4px; min-width: 14px; height: 14px; padding: 0 3px;
    background: var(--og-blue); color: #fff; font: 800 9px var(--font-ui);
    border-radius: 999px; display: grid; place-items: center; border: 2px solid #fff;
  }
  .cta {
    margin-left: 6px;
    background: var(--og-blue); color: #fff; border: none;
    padding: 10px 16px 10px 18px; border-radius: 999px;
    font: 700 13px var(--font-ui); cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    box-shadow: 0 6px 14px rgba(90,116,255,0.32);
  }
  .cta svg { width: 14px; height: 14px; }

  .announce {
    position: absolute; left: 50%; top: -10px; transform: translateX(-50%);
    background: var(--fg); color: #fff;
    font: 600 11px var(--font-ui); letter-spacing: 0.02em;
    padding: 4px 10px 4px 8px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .pulse { width: 6px; height: 6px; border-radius: 50%; background: #06D6A0; box-shadow: 0 0 0 3px rgba(6,214,160,0.3); }
</style></head>
<body>
  <div class="shell">
    <span class="announce"><span class="pulse"></span>Free shipping on orders over $30</span>
    <header>
      <nav>
        <a class="active">Shop</a>
        <a>Pets<span class="new-dot" title="New"></span></a>
        <a>How it works</a>
        <a>Support</a>
      </nav>
      <div class="logo"><img src="../assets/orbit-icon-mark.png" alt="Orbit"></div>
      <div class="right">
        <button class="ic"><i data-lucide="search"></i></button>
        <button class="ic"><i data-lucide="heart"></i></button>
        <button class="ic"><i data-lucide="shopping-bag"></i><span class="badge">2</span></button>
        <button class="cta">Get a pack <i data-lucide="arrow-right"></i></button>
      </div>
    </header>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
