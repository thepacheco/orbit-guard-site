<!-- @dsCard group="Components" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 18px; background: #fff; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card { background: #fff; border-radius: 28px; box-shadow: var(--shadow-2); padding: 10px; }
  .image { position: relative; background: #F6F6F4; border-radius: 22px; aspect-ratio: 1.05/1; overflow: hidden; }
  .tags { position: absolute; top: 12px; left: 12px; display: flex; gap: 6px; }
  .tag { font: 700 11px var(--font-ui); padding: 7px 12px; border-radius: 999px; color: #fff; letter-spacing: 0.02em; }
  .tag.dark { background: #1A1B1F; }
  .puck { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 58%; aspect-ratio: 1/1; border-radius: 50%; box-shadow: inset 0 0 0 22px rgba(255,255,255,0.45), 0 14px 28px rgba(0,0,0,0.15);}

  .row { display: grid; grid-template-columns: 1.6fr 0.9fr 0.7fr 0.7fr; gap: 6px; padding: 10px 4px 4px; align-items: stretch;}
  .packs { background: #F6F6F4; border-radius: 14px; display: flex; padding: 3px; gap: 3px; }
  .pack { flex: 1; border: none; background: transparent; border-radius: 11px; cursor: pointer; font: 700 11px var(--font-ui); padding: 6px 0; color: var(--fg-2); }
  .pack.active { background: #fff; color: var(--fg); box-shadow: var(--shadow-1); }

  .chip { background: #F6F6F4; border-radius: 14px; display: grid; place-items: center; padding: 0; }
  .chip.icon i { width: 18px; height: 18px; color: var(--fg); }
  .chip.rating { display: flex; flex-direction: row; gap: 5px; padding: 6px 8px; place-items: center; }
  .chip.rating .star { color: #F4B400; }

  .meta { padding: 14px 6px 4px; display: flex; justify-content: space-between; align-items: flex-end; }
  .brand { font: 600 11px var(--font-mono); letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .name { font: 700 18px var(--font-ui); letter-spacing: -0.01em; margin-top: 2px; }
  .price { text-align: right; }
  .old { font: 500 12px var(--font-ui); color: var(--fg-3); text-decoration: line-through; min-height: 16px; }
  .new { font: 700 18px var(--font-ui); color: var(--fg); letter-spacing: -0.01em; }
</style></head>
<body>
  <div class="grid">

    <!-- Card 1: Clover, 5-pack active -->
    <div class="card">
      <div class="image">
        <div class="tags">
          <span class="tag dark">−25%</span>
          <span class="tag" style="background:#06D6A0">Clover</span>
        </div>
        <div class="puck" style="background:#06D6A0"></div>
      </div>
      <div class="row">
        <div class="packs">
          <button class="pack active">5-pack</button>
          <button class="pack">10-pack</button>
        </div>
        <div class="chip rating">
          <i data-lucide="star" class="star" style="fill:#F4B400;color:#F4B400;width:14px;height:14px"></i>
          <span style="font:700 12px var(--font-ui)">4.9</span>
        </div>
        <div class="chip icon"><i data-lucide="heart"></i></div>
        <div class="chip icon"><i data-lucide="shopping-bag"></i></div>
      </div>
      <div class="meta">
        <div><div class="brand">Orbit</div><div class="name">Clover</div></div>
        <div class="price"><div class="old">$32</div><div class="new">$24</div></div>
      </div>
    </div>

    <!-- Card 2: Coral, 10-pack active -->
    <div class="card">
      <div class="image">
        <div class="tags">
          <span class="tag dark">New</span>
          <span class="tag" style="background:#FFB4A2;color:#fff">Coral</span>
        </div>
        <div class="puck" style="background:#FFB4A2"></div>
      </div>
      <div class="row">
        <div class="packs">
          <button class="pack">5-pack</button>
          <button class="pack active">10-pack</button>
        </div>
        <div class="chip rating">
          <i data-lucide="star" class="star" style="fill:#F4B400;color:#F4B400;width:14px;height:14px"></i>
          <span style="font:700 12px var(--font-ui)">4.8</span>
        </div>
        <div class="chip icon"><i data-lucide="heart"></i></div>
        <div class="chip icon"><i data-lucide="shopping-bag"></i></div>
      </div>
      <div class="meta">
        <div><div class="brand">Orbit</div><div class="name">Coral</div></div>
        <div class="price"><div class="old"></div><div class="new">$44</div></div>
      </div>
    </div>

  </div>
  <script>lucide.createIcons();</script>
</body></html>
