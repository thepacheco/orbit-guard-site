<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 22px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .cell { background: var(--og-white); box-shadow: var(--shadow-1); padding: 12px; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .demo { width: 56px; height: 56px; background: var(--og-blue); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .val { font-size: 11px; color: var(--fg-2); }
</style></head>
<body>
  <div class="grid">
    <div class="cell" style="border-radius:6px"><div class="demo" style="border-radius:6px"></div><div class="lbl">--r-xs</div><div class="val">6</div></div>
    <div class="cell" style="border-radius:10px"><div class="demo" style="border-radius:10px"></div><div class="lbl">--r-sm</div><div class="val">10</div></div>
    <div class="cell" style="border-radius:14px"><div class="demo" style="border-radius:14px"></div><div class="lbl">--r-md</div><div class="val">14</div></div>
    <div class="cell" style="border-radius:20px"><div class="demo" style="border-radius:20px"></div><div class="lbl">--r-lg</div><div class="val">20</div></div>
    <div class="cell" style="border-radius:28px"><div class="demo" style="border-radius:28px"></div><div class="lbl">--r-xl</div><div class="val">28</div></div>
    <div class="cell" style="border-radius:28px"><div class="demo" style="border-radius:999px"></div><div class="lbl">--r-pill</div><div class="val">999</div></div>
  </div>
</body></html>
