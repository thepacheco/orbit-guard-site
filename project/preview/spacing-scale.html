<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 22px; }
  .row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
  .row:last-child { margin-bottom: 0; }
  .tok { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); width: 60px; }
  .bar { height: 14px; background: var(--og-blue); border-radius: 4px; }
  .px { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); }
</style></head>
<body>
  <div class="row"><div class="tok">--s-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="tok">--s-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="tok">--s-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
  <div class="row"><div class="tok">--s-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="tok">--s-5</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
  <div class="row"><div class="tok">--s-6</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
  <div class="row"><div class="tok">--s-7</div><div class="bar" style="width:48px"></div><div class="px">48 px</div></div>
  <div class="row"><div class="tok">--s-8</div><div class="bar" style="width:64px"></div><div class="px">64 px</div></div>
  <div class="row"><div class="tok">--s-9</div><div class="bar" style="width:96px"></div><div class="px">96 px</div></div>
</body></html>
