<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; }

  .row { display: grid; grid-template-columns: 96px 1fr; align-items: baseline; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; }
  .eyebrow { font-family: var(--font-ui); font-weight: 700; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--og-blue); }
</style></head>
<body>
  <div class="stack">
    <div class="row"><div class="tag">Eyebrow</div><div class="eyebrow">For pets & cords</div></div>
    <div class="row"><div class="tag">H3 · 24</div><div style="font-family:var(--font-ui);font-weight:700;font-size:24px;line-height:1.2;letter-spacing:-0.01em">Five guards, no tools</div></div>
    <div class="row"><div class="tag">H4 · 18</div><div style="font-family:var(--font-ui);font-weight:700;font-size:18px">Choose a color</div></div>
    <div class="row"><div class="tag">Body · 16</div><div style="font-family:var(--font-body);font-size:16px;line-height:1.6">Clip one onto each caster and roll without the worry — your cat's tail will thank you.</div></div>
    <div class="row"><div class="tag">Small · 14</div><div style="font-size:14px;color:var(--fg-2)">Ships from Oakland in 1–2 days. Free returns for 60 days.</div></div>
    <div class="row"><div class="tag">Mono · 13</div><div class="og-mono" style="font-family:var(--font-mono);font-size:13px">SKU · OG-CLOVER-5</div></div>
  </div>
</body></html>
