<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; background: #fff; }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .row { display: grid; grid-template-columns: 100px 1fr; align-items: baseline; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; }
  .display { font-family: var(--font-display); font-weight: 400; font-size: 56px; line-height: 0.98; letter-spacing: -0.005em; color: var(--og-blue); }
  .h1 { font-family: var(--font-ui); font-weight: 700; font-size: 44px; line-height: 1.05; letter-spacing: -0.015em; }
  .h2 { font-family: var(--font-ui); font-weight: 700; font-size: 30px; line-height: 1.1; letter-spacing: -0.01em; }
</style></head>
<body>
  <div class="stack">
    <div class="row"><div class="tag">Display · Rez</div><div class="display">Roll on.</div></div>
    <div class="row"><div class="tag">H1 · DM Sans 700</div><div class="h1">Guards for every caster</div></div>
    <div class="row"><div class="tag">H2 · DM Sans 700</div><div class="h2">Quiet, soft, forgettable</div></div>
  </div>
</body></html>
