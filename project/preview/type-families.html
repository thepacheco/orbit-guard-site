<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 22px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .fam { padding: 16px; border-radius: var(--r-md); background: var(--og-white); box-shadow: var(--shadow-1); display:flex; flex-direction:column; gap:6px; }
  .name { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-3); }
  .sub { font-size: 12px; color: var(--fg-2); }
  .spec { font-size: 22px; line-height: 1.15; }
</style></head>
<body>
  <div class="grid">
    <div class="fam"><div class="name">Display · Rez</div><div class="spec" style="font-family:var(--font-display)">Orbit Guard</div><div class="sub">Hero / display moments only.</div></div>
    <div class="fam"><div class="name">UI · DM Sans <span style="color:var(--og-blue)">↔ HK Grotesk</span></div><div class="spec" style="font-family:var(--font-ui);font-weight:700">Aa — buttons, headings</div><div class="sub">Primary UI face. 400/500/700.</div></div>
    <div class="fam"><div class="name">Body · ABeeZee</div><div class="spec" style="font-family:var(--font-body)">Aa — friendly prose</div><div class="sub">Used in marketing paragraphs.</div></div>
    <div class="fam"><div class="name">Mono · JetBrains</div><div class="spec" style="font-family:var(--font-mono)">SKU · OG-001</div><div class="sub">Specs, codes, receipts.</div></div>
  </div>
</body></html>
