<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Orbit Guard — Marketing UI kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #fff; }
    @keyframes ogSpin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
    @keyframes ogMarquee { from { transform: translateX(0);} to { transform: translateX(-50%);} }
    /* Light mobile pass — stack the big grids when narrow */
    @media (max-width: 900px) {
      section[data-og-section] { padding-left: 24px !important; padding-right: 24px !important; }
      section[data-og-grid] > div:first-child { grid-template-columns: 1fr !important; gap: 32px !important; padding-left: 20px !important; padding-right: 20px !important; }
    }
    @media (max-width: 720px) {
      h1, h2 { font-size: 36px !important; line-height: 1.1 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="ProductHero.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;
    function App() {
      const [variantKey, setVariantKey] = useState("blueberry");
      const variant = PRODUCT_VARIANTS.find(v => v.key === variantKey) || PRODUCT_VARIANTS[0];

      useEffect(() => { lucide.createIcons(); });

      return (
        <>
          <Header dark={variant.dark} />
          <Hero variant={variant} setVariantKey={setVariantKey} />
          <AboutOrbit v={variant} />
          <HowItWorks v={variant} />
          <StemFit v={variant} />
          <Reviews v={variant} />
          <Kickstarter v={variant} />
          <FooterCta v={variant} />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
